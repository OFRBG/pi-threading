# Publish on every v* tag: `pi-threading` to npmjs (primary — anonymous
# installs) and `@ofrbg/pi-threading` to the GitHub npm registry (mirror).
# Only the free suites run here (unit + MCP + typecheck + lint) — the e2e
# suites need a model API key and real spend, so they stay local/manual.
#
# npmjs needs an automation token in the NPM_TOKEN repo secret; the step
# is skipped with a warning until one exists. The GitHub publish uses the
# built-in GITHUB_TOKEN. GH-registry consumers need a read:packages PAT:
#   @ofrbg:registry=https://npm.pkg.github.com
#   //npm.pkg.github.com/:_authToken=<token>
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run test:mcp

      # Refuse to publish a tag that disagrees with package.json.
      - name: Check tag matches package version
        if: github.ref_type == 'tag'
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "package.json is $pkg but tag is $tag" >&2
            exit 1
          fi

      - name: Publish pi-threading to npmjs
        if: env.NPM_TOKEN != ''
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc
          npm publish --registry https://registry.npmjs.org --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Warn when NPM_TOKEN is missing
        if: env.NPM_TOKEN == ''
        run: echo "::warning::NPM_TOKEN secret not set — skipped the npmjs publish"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ofrbg/pi-threading to the GitHub registry
        run: |
          npm pkg set name=@ofrbg/pi-threading
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
