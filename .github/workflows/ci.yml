# Free checks on every push and PR — typecheck, lint, unit, MCP server.
# The e2e suites (real model calls, real spend) are deliberately not here.
name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test:unit
      - run: npm run test:mcp
